<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Check</title>
  <meta name="description" content="Open-source climate risk models for real estate. CRREM stranding analysis, carbon intensity projections, and portfolio reporting.">
  <meta name="theme-color" content="#0969da">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%230969da'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18'>%E2%97%8F</text></svg>">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border-muted);
    }
    .site-header-inner {
      max-width: 1120px; margin: 0 auto;
      display: flex; align-items: center; gap: 16px;
      padding: 12px 24px;
    }
    .site-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--fg);
      font-weight: 700; font-size: 15px;
    }
    .site-logo:hover { text-decoration: none; opacity: 0.85; }
    .site-logo svg { color: var(--accent); }
    .site-tagline { font-size: 13px; color: var(--fg-faint); }
    .header-lang {
      margin-left: auto;
    }
    .lang-select {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-muted);
      background: var(--bg-muted);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-sm);
      padding: 3px 6px;
      cursor: pointer;
    }
    .lang-select:disabled { opacity: 0.5; cursor: default; }

    /* Main */
    .site-main {
      flex: 1; max-width: 1120px; width: 100%;
      margin: 0 auto; padding: 32px 24px;
    }

    /* Loading */
    .loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px; gap: 16px;
    }
    .loader-spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border-muted);
      padding: 12px 24px;
    }
    .site-footer-inner {
      max-width: 1120px; margin: 0 auto;
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 8px;
      font-size: 11px; color: var(--fg-faint);
    }
    .site-footer a { color: var(--fg-faint); }
    .site-footer a:hover { color: var(--fg-muted); }
    .footer-links { display: flex; gap: 12px; }

    /* Skip link */
    .skip-link {
      position: absolute; top: -40px; left: 0;
      background: var(--accent-emphasis); color: #fff;
      padding: 8px 16px; z-index: 200; font-size: 13px;
      text-decoration: none; border-radius: 0 0 6px 0;
    }
    .skip-link:focus { top: 0; }

    @media (max-width: 768px) {
      .site-header-inner { padding: 10px 16px; }
      .site-tagline { display: none; }
      .site-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#app">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="#/">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1.5C10 1.5 6.5 5 6.5 10s3.5 8.5 3.5 8.5" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
          <path d="M10 1.5c0 0 3.5 3.5 3.5 8.5s-3.5 8.5-3.5 8.5" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
          <ellipse cx="10" cy="10" rx="8.5" ry="3.5" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        </svg>
        climate-check
      </a>
      <span class="site-tagline">Open-source climate risk models for real estate</span>
      <div class="header-lang" aria-label="Language">
        <select class="lang-select" disabled>
          <option>EN</option>
        </select>
      </div>
    </div>
  </header>

  <main class="site-main" id="app">
    <div class="loader">
      <div class="loader-spinner"></div>
      <span class="f6 fgColor-muted">Loading models&hellip;</span>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span>&copy; 2026 climate-check</span>
      <nav class="footer-links">
        <a href="https://github.com/davras5/climate-check" target="_blank" rel="noopener">Source</a>
        <a href="#" class="fgColor-faint">API</a>
      </nav>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
  <script src="js/engines/crrem-eu.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
